<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control QA PAM - Portal Institucional</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        .progress-ring-circle {
            transition: stroke-dasharray 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- APP CONTAINER -->
    <div id="app">
        <!-- El contenido se genera dinámicamente con JavaScript -->
    </div>

    <script>
        // --- DATOS DEL DASHBOARD (EXCLUSIVAMENTE PAM) ---

            {
                id: 'pam',
                nombre: 'PAM',
                enteRector: 'PAM',
                descripcion: 'Plataforma de estudio socioeconómico y nómina.',
                progresoGlobal: 85,

                qaData: {

                    usaModulos: true,

                                    id: 1,

                                    codigo: 'PAM-001-2026',
                                    fechaInicio: '19-02-2026',
                                    fechaFinalizacion: '28/04/2026',
                                    fechas: [
                                        { label: 'Inicio de pruebas QA por ente rector', value: '17/12/2025' },
                                        { label: 'Fin de pruebas QA por ente rector', value: '19/02/2026' },
                                        { label: 'Fin de Desarrollo de correcciones enviadas por ente rector (Responsable DISI)', value: '28/04/2026', highlightBlue: true }
                                    ],
                                    responsable: 'Clara Flores / Edgar Herrarte / Alex de León',
                                    estatus: 'Finalizado',
                                    correcciones: {
                                        detectadas: 23,
                                        nuevosRequerimientos: 1,
                                        aAtender: 22,
                                        atendidas: 22,
                                        pendientes: 0,
                                        observacion: 'Se encuentra pendiente el ítem ID 04, correspondiente a la incorporación de los campos de región y microrregión dentro de la estructura de municipios.'
                                    }
                                },
                                {
                                    id: 2,
                                    nombre: 'Prueba QA 002',
                                    codigo: 'PAM-002-2026',
                                    fechaInicio: '30/03/2026',
                                    fechaFinalizacion: '28/04/2026',
                                    fechas: [
                                        { label: 'Inicio de pruebas QA por ente rector', value: '24/03/2026' },
                                        { label: 'Fin de pruebas QA por ente rector', value: '27/03/2026' },
                                        { label: 'Fin de Desarrollo de correcciones enviadas por ente rector (Responsable DISI)', value: '28/04/2026', highlightBlue: true }
                                    ],
                                    responsable: 'Clara Flores, Melany Zac Cardona, Alex Eduardo de León Hernández, Sandra Jerónimo, Valeria Salvatierra',
                                    estatus: 'Finalizado',
                                    correcciones: {
                                        detectadas: 15,
                                        nuevosRequerimientos: 0,
                                        aAtender: 14,
                                        atendidas: 14,
                                        pendientes: 0,
                                        observacion: 'Queda pendiente el item con ID 03 el cual será atendido cuando el PAM traslade la información del lugar poblado que necesitan'
                                    }
                                },
                                {
                                    id: 3,
                                    nombre: 'Prueba QA 003',
                                    isPlaceholder: true,
                                    fechas: [
                                        { label: 'Inicio de pruebas QA por ente rector', value: '19/05/2026' },
                                        { label: 'Traslado de pruebas QA por ente rector', value: '28/05/2026' }
                                    ]
                                }
                            ]
                        },
                        { 
                            id: 'mod2', 
                            nombre: 'Módulo 02: Estudio Socioeconómico', 
                            pruebas: [
                                {
                                    id: 1,
                                    nombre: 'Prueba QA 001',
                                    codigo: 'PAM-002-2026',
                                    fechaInicio: '21/07/2026',
                                    fechaFinalizacion: '24/07/2026',
                                    fechas: [
                                        { label: 'Inicio de pruebas QA por ente rector', value: '24/03/2026' },
                                        { label: 'Fin de pruebas QA por ente rector', value: '27/03/2026' },
                                        { label: 'Fin de Desarrollo de correcciones enviadas por ente rector (Responsable DISI)', value: '21/07/2026', highlightBlue: true },
                                        { label: 'Inicio de Pruebas QA 002 (Responsable PAM)', value: '24/07/2026', highlight: true }
                                    ],
                                    responsable: 'Lesly De León, Carmelina Hernández, Cecilia Mérida, Lucero Barrios, Alejandra Beltetón, Valeria Salvatierra, Clara Flores, Sharon Cisneros',
                                    estatus: 'En proceso',
                                    correcciones: {
                                        detectadas: 8,
                                        nuevosRequerimientos: 0,
                                        aAtender: 8,
                                        atendidas: 0,
                                        pendientes: 8,
                                        observacion: 'Las fechas se ajustaron debido a que los esfuerzos se concentraron en dos frentes prioritarios: la entrega —ya efectuada— del módulo de control financiero y del Módulo de generación de carnets y notificaciones, así como el fortalecimiento de la infraestructura de seguridad en 21 sistemas del Ministerio de Trabajo y Previsión Social, como medida de respuesta ante contingencias tecnológicas recientes para garantizar la continuidad operativa.'
                                    }
                                }
                            ] 
                        },
                        { 
                            id: 'mod3', 
                            nombre: 'Módulo 03: Jurídico', 
                            pruebas: [
                                {
                                    id: 1,
                                    nombre: 'Prueba QA 001',
                                    codigo: 'PAM-JUR-001-2026',
                                    fechaInicio: '23/06/2026',
                                    fechaFinalizacion: '26/06/2026',
                                    fechas: [
                                        { label: 'Inicio de pruebas QA por ente rector', value: '24/03/2026' },
                                        { label: 'Fin de pruebas QA por ente rector', value: '27/03/2026' },
                                        { label: 'Fin de Desarrollo de correcciones enviadas por ente rector (Responsable DISI)', value: '23/06/2026', highlightBlue: true },
                                        { label: 'Inicio de Pruebas QA 002 (Responsable PAM)', value: '26/06/2026', highlight: true }
                                    ],
                                    responsable: 'David García, César Oliva',
                                    estatus: 'En proceso',
                                    correcciones: {
                                        detectadas: 8,
                                        nuevosRequerimientos: 0,
                                        aAtender: 8,
                                        atendidas: 0,
                                        pendientes: 8,
                                        observacion: 'Las fechas se ajustaron debido a que los esfuerzos se concentraron en dos frentes prioritarios: la entrega —ya efectuada— del módulo de control financiero y del Módulo de generación de carnets y notificaciones, así como el fortalecimiento de la infraestructura de seguridad en 21 sistemas del Ministerio de Trabajo y Previsión Social, como medida de respuesta ante contingencias tecnológicas recientes para garantizar la continuidad operativa.'
                                    }
                                }
                            ] 
                        },
                        { id: 'mod4', nombre: 'Módulo 04: Control financiero', pruebas: [] },
                        { 
                            id: 'mod5', 
                            nombre: 'Módulo 05: Generación de Carnets y notificaciones', 
                            pruebas: [
                                {
                                    id: 1,
                                    nombre: 'Prueba QA 001',
                                    isPlaceholder: true,
                                    fechas: [
                                        { label: 'Inicio de pruebas QA por ente rector', value: '13/05/2026' },
                                        { label: 'Traslado de pruebas QA por ente rector', value: '28/05/2026' }
                                    ]
                                }
                            ] 
                        }
                    ]
                }
            }
        ];

        // --- ESTADO GLOBAL ---
        let perfilUsuario = 'admin';
        let idProyectoActivo = 'pam';
        let indiceModuloActivo = 0;
        let indicePruebaActiva = 0;
        let mostrarMenuPerfil = false;

        // --- FUNCIONES DE UTILIDAD ---
        function getProyectoActivo() {
            return proyectosData[0]; // Retorna siempre PAM
        }

        function getEstatusColor(estatus) {
            switch (estatus) {
                case 'Finalizado': return 'bg-green-100 text-green-800 border-green-200';
                case 'En proceso': return 'bg-yellow-100 text-yellow-800 border-yellow-200';
                case 'No iniciado': return 'bg-red-100 text-red-800 border-red-200';
                default: return 'bg-gray-100 text-gray-800 border-gray-200';
            }
        }

        function getEstatusIcon(estatus) {
            switch (estatus) {
                case 'Finalizado': return 'check-circle-2';
                case 'En proceso': return 'clock';
                case 'No iniciado': return 'alert-circle';
                default: return 'help-circle';
            }
        }

        // --- RENDERIZADO ---
        function render() {
            const app = document.getElementById('app');
            const proyectoActivo = getProyectoActivo();
            const moduloActivo = proyectoActivo.qaData.modulos[indiceModuloActivo];
            const listaPruebas = moduloActivo?.pruebas || [];
            const pruebaActiva = listaPruebas[indicePruebaActiva] || null;
            
            const avancePrueba = pruebaActiva && pruebaActiva.correcciones && pruebaActiva.correcciones.aAtender > 0 
                ? Math.round((pruebaActiva.correcciones.atendidas / pruebaActiva.correcciones.aAtender) * 100)
                : (pruebaActiva?.estatus === 'Finalizado' ? 100 : 0);

            app.innerHTML = `
                <!-- NAV -->
                <nav class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                    <div class="flex items-center space-x-2">
                        <div class="bg-[#0a2e5c] p-2 rounded-lg">
                            <i data-lucide="clipboard-check" class="w-5 h-5 text-white"></i>
                        </div>
                        <span class="font-bold text-gray-800 hidden sm:block">Control QA Proyectos</span>
                    </div>

                    <div>
                        <div class="flex items-center space-x-3 bg-gray-50 px-4 py-2 rounded-full border border-gray-200">
                            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700">
                                <i data-lucide="user" class="w-4 h-4"></i>
                            </div>
                            <div class="text-left hidden md:block">
                                <p class="text-xs font-bold text-gray-900 leading-none">Administrador DISI</p>
                                <p class="text-[10px] text-gray-500">${proyectoActivo.enteRector}</p>
                            </div>
                        </div>
                    </div>
                </nav>

                <!-- HEADER HERO (PORTADA SIMPLIFICADA PARA PAM) -->
                <div class="bg-[#0a2e5c] pt-6 pb-12 px-6 lg:px-12">
                    <div class="max-w-7xl mx-auto">
                        <div class="flex flex-col items-center justify-center text-center py-2">
                            <div class="bg-white/10 p-3 rounded-full mb-3 border border-white/20">
                                <i data-lucide="${proyectoActivo.icono}" class="w-8 h-8 text-white"></i>
                            </div>
                            <h1 class="text-2xl font-bold text-white mb-1">PRUEBAS DE CALIDAD</h1>
                            <p class="text-blue-200 text-base">${proyectoActivo.enteRector}</p>
                            <div class="mt-4 bg-white/10 px-5 py-2 rounded-full border border-white/20 flex items-center space-x-3">
                                <span class="text-white font-medium uppercase text-xs">Proyecto en curso:</span>
                                <span class="text-blue-100 font-bold text-sm uppercase">${proyectoActivo.nombre}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- MAIN AREA -->
                <div class="max-w-7xl mx-auto px-6 lg:px-12 -mt-6 pb-12">
                    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
                        <div class="bg-white border-b border-gray-100 p-6 sm:px-10 flex flex-col gap-5">
                            <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                <div>
                                    <h2 class="text-2xl font-bold text-gray-800">
                                        Resumen Ejecutivo: <span class="text-blue-600">${proyectoActivo.nombre}</span>
                                    </h2>
                                </div>
                                <div class="flex items-center px-4 py-2 rounded-full border-2 font-bold ${getEstatusColor(proyectoActivo.qaData.estatusGeneral)}">
                                    <i data-lucide="${getEstatusIcon(proyectoActivo.qaData.estatusGeneral)}" class="w-5 h-5 mr-2"></i>
                                    <span class="uppercase text-xs">${proyectoActivo.qaData.estatusGeneral}</span>
                                </div>
                            </div>
                        </div>

                        <div class="p-6 sm:p-10 bg-gray-50/50">
                            <!-- Selector de Módulos -->
                            <div class="mb-8 bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                                <p class="text-[10px] font-bold text-gray-400 uppercase mb-3">Módulos del Sistema en Revisión</p>
                                <div class="flex flex-wrap gap-2">
                                    ${proyectoActivo.qaData.modulos.map((mod, index) => `
                                        <button onclick="cambiarModulo(${index})" class="px-4 py-2.5 rounded-xl font-bold text-sm transition-all border flex items-center ${index === indiceModuloActivo ? 'bg-[#0a2e5c] text-white border-[#0a2e5c] shadow-lg scale-105' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}">
                                            ${mod.nombre}
                                            ${mod.pruebas.length > 0 ? `<span class="ml-2 px-1.5 py-0.5 rounded-full text-[10px] ${index === indiceModuloActivo ? 'bg-white/20 text-white' : 'bg-gray-100 text-gray-400'}">${mod.pruebas.length}</span>` : ''}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>

                            <!-- Selector de Pruebas -->
                            ${listaPruebas.length > 0 ? `
                                <div class="flex flex-wrap gap-2 mb-6 border-b border-gray-200 pb-4">
                                    ${listaPruebas.map((p, index) => `
                                        <button onclick="cambiarPrueba(${index})" class="px-4 py-2 rounded-lg font-bold text-xs transition-all border uppercase tracking-tighter ${index === indicePruebaActiva ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-gray-400 border-gray-200 hover:bg-gray-50'}">
                                            ${p.nombre}
                                        </button>
                                    `).join('')}
                                </div>
                            ` : ''}

                            <!-- Detalle de Prueba -->
                            ${pruebaActiva && !pruebaActiva.isPlaceholder ? `
                                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8 animate-fade-in">
                                    <div class="lg:col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 items-start">
                                            <div>
                                                <p class="text-xs text-gray-400 mb-1 font-bold uppercase">Código de la Prueba</p>
                                                <p class="text-lg font-bold text-gray-800 flex items-center">
                                                    <i data-lucide="activity" class="w-5 h-5 mr-2 text-blue-500"></i> ${pruebaActiva.codigo}
                                                </p>
                                            </div>
                                            <div>
                                                <p class="text-xs text-gray-400 mb-1 font-bold uppercase">Responsable Institucional</p>
                                                <p class="text-lg font-bold text-gray-800 flex items-center leading-tight">
                                                    <i data-lucide="user" class="w-5 h-5 mr-2 text-blue-500 shrink-0"></i> ${pruebaActiva.responsable}
                                                </p>
                                            </div>
                                            <div class="flex justify-start sm:justify-end">
                                                <div class="inline-flex items-center px-3 py-1 rounded-full border text-[10px] font-black ${getEstatusColor(pruebaActiva.estatus)}">
                                                    <i data-lucide="${getEstatusIcon(pruebaActiva.estatus)}" class="w-3 h-3 mr-1"></i>
                                                    <span class="uppercase">${pruebaActiva.estatus}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-6 border-t border-gray-50 mt-6">
                                            ${(pruebaActiva.fechas || []).map(function(f) {
                                                if (f.highlight) {
                                                    return '<div class="bg-green-50 px-4 py-3 rounded-xl border border-green-200 shadow-sm"><p class="text-[10px] text-green-700 mb-1 font-black uppercase leading-tight">' + f.label + '</p><p class="text-sm font-black text-green-800 flex items-center"><i data-lucide="check-circle" class="w-4 h-4 mr-2 text-green-600 shrink-0"></i> ' + f.value + '</p></div>';
                                                }
                                                if (f.highlightBlue) {
                                                    return '<div class="bg-blue-50 px-4 py-3 rounded-xl border border-blue-200 shadow-sm"><p class="text-[10px] text-blue-700 mb-1 font-black uppercase leading-tight">' + f.label + '</p><p class="text-sm font-black text-blue-800 flex items-center"><i data-lucide="info" class="w-4 h-4 mr-2 text-blue-600 shrink-0"></i> ' + f.value + '</p></div>';
                                                }
                                                return '<div class="px-2 py-1"><p class="text-[10px] text-gray-400 mb-1 font-bold uppercase leading-tight">' + f.label + '</p><p class="text-sm font-bold text-gray-700 flex items-center"><i data-lucide="calendar" class="w-4 h-4 mr-2 text-blue-400 shrink-0"></i> ' + f.value + '</p></div>';
                                            }).join('')}
                                        </div>
                                    </div>

                                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex flex-col justify-center items-center">
                                        <p class="text-[11px] text-gray-400 font-bold uppercase mb-4 w-full text-center">Avance en atención de correcciones por DISI</p>
                                        <div class="relative w-36 h-36 flex justify-center items-center">
                                            <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                                <circle cx="18" cy="18" r="16" fill="none" stroke="#f3f4f6" stroke-width="3"></circle>
                                                <circle cx="18" cy="18" r="16" fill="none" stroke="${pruebaActiva.estatus === 'Finalizado' ? '#22c55e' : '#2563eb'}" stroke-width="3" stroke-dasharray="${avancePrueba}, 100" stroke-linecap="round" class="progress-ring-circle"></circle>
                                            </svg>
                                            <div class="absolute flex flex-col items-center justify-center">
                                                <span class="text-4xl font-black text-gray-800 leading-none">${avancePrueba}<span class="text-lg">%</span></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <h3 class="text-sm font-black text-gray-400 uppercase mb-4 flex items-center">
                                    <i data-lucide="activity" class="w-4 h-4 mr-2"></i> Control de Hallazgos y Correcciones
                                </h3>

                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                                    ${[
                                        { label: 'correcciones a atender por DISI', value: pruebaActiva.correcciones.aAtender, color: 'bg-cyan-50 border-cyan-200 text-cyan-700 ring-1 ring-cyan-100', icon: 'clipboard-list' },
                                        { label: 'correcciones atendidas por DISI', value: pruebaActiva.correcciones.atendidas, color: 'bg-green-50 border-green-100 text-green-600', icon: 'wrench' },
                                        { label: 'nuevos requerimientos', value: pruebaActiva.correcciones.nuevosRequerimientos, color: 'bg-indigo-50 border-indigo-100 text-indigo-600', icon: 'file-plus' },
                                        { label: 'total de correcciones detectadas en QA', value: pruebaActiva.correcciones.detectadas, color: 'bg-red-50 border-red-100 text-red-600', icon: 'bug' }
                                    ].map(stat => `
                                        <div class="rounded-2xl p-4 border flex flex-col justify-between transition-all ${stat.color}">
                                            <div class="flex justify-between items-start mb-2">
                                                <p class="text-[10px] font-black uppercase leading-tight">${stat.label}</p>
                                                <i data-lucide="${stat.icon}" class="w-4 h-4 opacity-70"></i>
                                            </div>
                                            <p class="text-3xl font-black">${stat.value}</p>
                                        </div>
                                    `).join('')}
                                </div>

                                <div class="rounded-2xl p-6 border ${pruebaActiva.correcciones.pendientes > 0 ? 'bg-orange-50 border-orange-200' : 'bg-green-50 border-green-200'}">
                                    <div class="flex items-start">
                                        <div class="mt-1 mr-4">
                                            <i data-lucide="${pruebaActiva.correcciones.pendientes > 0 ? 'alert-circle' : 'check-circle-2'}" class="w-6 h-6 ${pruebaActiva.correcciones.pendientes > 0 ? 'text-orange-500' : 'text-green-500'}"></i>
                                        </div>
                                        <div class="flex-1">
                                            <h4 class="text-xs font-black uppercase tracking-widest mb-2 ${pruebaActiva.correcciones.pendientes > 0 ? 'text-orange-800' : 'text-green-800'}">Observaciones y Estatus de Hallazgos</h4>
                                            <p class="text-sm leading-relaxed font-medium ${pruebaActiva.correcciones.pendientes > 0 ? 'text-orange-900' : 'text-green-900'}">${pruebaActiva.correcciones.observacion}</p>
                                        </div>
                                    </div>
                                </div>
                            ` : `
                                <div class="bg-white rounded-3xl p-16 border-2 border-dashed border-gray-200 flex flex-col items-center justify-center text-center">
                                    <div class="bg-gray-50 p-6 rounded-full mb-6">
                                        <i data-lucide="clipboard-check" class="w-12 h-12 text-gray-300"></i>
                                    </div>
                                    <p class="text-gray-500 text-lg font-bold max-w-md mx-auto leading-relaxed ${pruebaActiva && pruebaActiva.fechas ? 'mb-8' : ''}">
                                        ${pruebaActiva && pruebaActiva.mensajePersonalizado ? pruebaActiva.mensajePersonalizado : 'Fase de planificación por DISI.'}
                                    </p>
                                    ${pruebaActiva && pruebaActiva.fechas ? `
                                        <div class="flex flex-wrap justify-center gap-4 w-full max-w-2xl">
                                            ${pruebaActiva.fechas.map(f => `
                                                <div class="bg-white px-4 py-3 rounded-xl border border-gray-200 shadow-sm text-left min-w-[220px]">
                                                    <p class="text-[10px] text-gray-400 mb-1 font-bold uppercase leading-tight">${f.label}</p>
                                                    <p class="text-sm font-bold text-gray-700 flex items-center">
                                                        <i data-lucide="calendar" class="w-4 h-4 mr-2 text-blue-400 shrink-0"></i> ${f.value}
                                                    </p>
                                                </div>
                                            `).join('')}
                                        </div>
                                    ` : ''}
                                </div>
                            `}
                        </div>
                    </div>
                </div>

                <!-- FOOTER -->
                <footer class="max-w-7xl mx-auto px-6 py-8 text-center border-t border-gray-200 mt-8">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                        Sistema de Control de Calidad Institucional &copy; 2026 - Acceso Restringido | Visualización para ${proyectoActivo.enteRector}
                    </p>
                </footer>
            `;

            // Inicializar iconos de Lucide después del render
            lucide.createIcons();
        }

        // --- MANEJADORES DE EVENTOS ---
        window.cambiarModulo = (index) => {
            indiceModuloActivo = index;
            indicePruebaActiva = 0;
            render();
        };

        window.cambiarPrueba = (index) => {
            indicePruebaActiva = index;
            render();
        };

        // --- INICIO ---
        render();

    </script>
