<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control QA Proyectos - Portal Institucional</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        .progress-ring-circle {
            transition: stroke-dasharray 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- APP CONTAINER -->
    <div id="app">
        <!-- El contenido se genera dinámicamente con JavaScript -->
    </div>

    <script>
        // --- DATOS DEL DASHBOARD ---
        const proyectosData = [
            {
                id: 'denuncias',
                nombre: 'Sistema para gestión de denuncias',
                enteRector: 'INSPECCIÓN GENERAL DE TRABAJO',
                descripcion: 'Modernización de denuncias, actas y operativos de inspección.',
                progresoGlobal: 91,
                icono: 'scale',
                qaData: {
                    estatusGeneral: 'En proceso',
                    usaModulos: false,
                    pruebas: [
                        {
                            id: 1,
                            nombre: 'Prueba QA 001',
                            codigo: 'IGT-001-2026',
                            fechaInicio: '17/04/2026',
                            fechaFinalizacion: '15/05/2026',
                            responsable: 'Inspección General de Trabajo',
                            estatus: 'En proceso',
                            correcciones: {
                                detectadas: 20,

                            }
                        }
                    ]
                }
            },
            {
                id: 'pex',
                nombre: 'Sistema PEX',
                enteRector: 'PERMISO DE TRABAJO PARA EXTRANJEROS',
                descripcion: 'Gestión digital de permisos laborales.',
                progresoGlobal: 91,
                icono: 'book-marked',
                qaData: {
                    estatusGeneral: 'En proceso',
                    usaModulos: false,
                    pruebas: [
                        {
                            id: 1,
                            nombre: 'Prueba QA 001',
                            codigo: 'PEX-001-2026',
                            fechaInicio: '30/03/2026',
                            fechaFinalizacion: '04-05-2026',
                            responsable: 'Jose Guillermo Folgar Madrid',
                            estatus: 'En proceso',
                            correcciones: {
                                detectadas: 36,
                                nuevosRequerimientos: 8,
                                aAtender: 36,
                                atendidas: 33,
                                pendientes: 3,
                                observacion: 'Total de 36 hallazgos (28 base + 8 solicitudes adicionales). Se han finalizado 33 tareas. Pendientes actuales (3): 1. Barrido general de tildes en etiquetas, mensajes de error, menús y formularios. 2. Habilitar reactivación de expedientes rechazados para permitir su continuidad sin iniciar de cero. 3. Actualización de catálogos de documentos (Literales A, F, E, B, G, M) para garantizar consistencia entre sistema y formularios.'
                            }
                        }
                    ]
                }
            },
            {
                id: 'pam',
                nombre: 'Sistema PAM',
                enteRector: 'PROG. APORTE ECONÓMICO DEL ADULTO MAYOR',
                descripcion: 'Plataforma de estudio socioeconómico y nómina.',
                progresoGlobal: 85,
                icono: 'heart-handshake',
                qaData: {
                    estatusGeneral: 'En proceso',
                    usaModulos: true,
                    modulos: [
                        {
                            id: 'mod1',
                            nombre: 'Módulo 01: Inscripción',
                            pruebas: [
                                {
                                    id: 1,
                                    nombre: 'Prueba QA 001',
                                    codigo: 'PAM-001-2026',
                                    fechaInicio: '19-02-2026',
                                    fechaFinalizacion: '28/04/2026',
                                    responsable: 'Clara Flores / Edgar Herrarte / Alex de León',
                                    estatus: 'Finalizado',
                                    correcciones: {
                                        detectadas: 29,
                                        nuevosRequerimientos: 8,
                                        aAtender: 21,
                                        atendidas: 21,
                                        pendientes: 0,
                                        observacion: 'Resultados acumulados de Clara Flores, Edgar Herrarte y Alex de León. De 29 observaciones históricas en total: se atendieron las 21 correspondientes a la fase actual (9 de Clara, 8 de Edgar, 4 de Alex). Las 8 observaciones restantes han sido excluidas de esta fase (2 son nuevos requerimientos y 6 corresponden al módulo de estudio socioeconómico).'
                                    }
                                },
                                {
                                    id: 2,
                                    nombre: 'Prueba QA 02 PAM',
                                    codigo: 'PAM-002-2026',
                                    fechaInicio: '30/03/2026',
                                    fechaFinalizacion: '28/04/2026',
                                    responsable: 'Clara Flores, Melany Zac Cardona, Alex Eduardo de León Hernández, Sandra Jerónimo, Valeria Salvatierra',
                                    estatus: 'En proceso',
                                    correcciones: {
                                        detectadas: 16,
                                        nuevosRequerimientos: 1,
                                        aAtender: 15,
                                        atendidas: 14,
                                        pendientes: 1,
                                        observacion: 'De 16 observaciones detectadas, se han corregido 14. De las 2 restantes: 1 se encuentra pendiente (PAM debe proporcionar la información que desea actualizar en el catálogo de lugar poblado) y 1 fue clasificada como nuevo requerimiento para la siguiente fase de actualización, ya que no forma parte de los requerimientos iniciales.'
                                    }
                                }
                            ]
                        },
                        { 
                            id: 'mod2', 
                            nombre: 'Módulo 02: Estudio Socioeconómico', 
                            pruebas: [
                                {
                                    id: 1,
                                    nombre: 'Prueba QA 001',
                                    codigo: 'PAM-ESE-001-2026',
                                    fechaInicio: '31/03/2026',
                                    fechaFinalizacion: '08/05/2026',
                                    responsable: 'Lesly De León, Carmelina Hernández, Cecilia Mérida, Lucero Barrios, Alejandra Beltetón, Valeria Salvatierra, Clara Flores, Sharon Cisneros',
                                    estatus: 'En proceso',
                                    correcciones: {
                                        detectadas: 8,
                                        nuevosRequerimientos: 0,
                                        aAtender: 8,
                                        atendidas: 0,
                                        pendientes: 8,
                                        observacion: '8 Observaciones de QA identificadas. Según cronograma, la solventación de estas correcciones finalizará el 08 de mayo de 2026.'
                                    }
                                }
                            ] 
                        },
                        { 
                            id: 'mod3', 
                            nombre: 'Módulo 03: Jurídico', 
                            pruebas: [
                                {
                                    id: 1,
                                    nombre: 'Prueba QA 001',
                                    codigo: 'PAM-JUR-001-2026',
                                    fechaInicio: '31/03/2026',
                                    fechaFinalizacion: '01/06/2026',
                                    responsable: 'David García, César Oliva',
                                    estatus: 'En proceso',
                                    correcciones: {
                                        detectadas: 8,
                                        nuevosRequerimientos: 0,
                                        aAtender: 8,
                                        atendidas: 0,
                                        pendientes: 8,
                                        observacion: '8 Observaciones de QA enviadas el 31 de marzo. Se proyecta la finalización de las correcciones para el 01 de junio de 2026 según cronograma.'
                                    }
                                }
                            ] 
                        },
                        { id: 'mod4', nombre: 'Módulo 04: Control financiero', pruebas: [] },
                        { id: 'mod5', nombre: 'Módulo 05: Generación de Carnets y notificaciones', pruebas: [] }
                    ]
                }
            }
        ];

        // --- ESTADO GLOBAL ---
        let perfilUsuario = 'admin';
        let idProyectoActivo = proyectosData[0].id;
        let indiceModuloActivo = 0;
        let indicePruebaActiva = 0;
        let mostrarMenuPerfil = false;

        // --- FUNCIONES DE UTILIDAD ---
        function getProyectoActivo() {
            return proyectosData.find(p => p.id === idProyectoActivo);
        }

        function getEstatusColor(estatus) {
            switch (estatus) {
                case 'Finalizado': return 'bg-green-100 text-green-800 border-green-200';
                case 'En proceso': return 'bg-yellow-100 text-yellow-800 border-yellow-200';
                case 'No iniciado': return 'bg-red-100 text-red-800 border-red-200';
                default: return 'bg-gray-100 text-gray-800 border-gray-200';
            }
        }

        function getEstatusIcon(estatus) {
            switch (estatus) {
                case 'Finalizado': return 'check-circle-2';
                case 'En proceso': return 'clock';
                case 'No iniciado': return 'alert-circle';
                default: return 'help-circle';
            }
        }

        function calcularAvanceGeneral(proyecto) {
            let totalAAtender = 0;
            let totalAtendidas = 0;
            
            const pruebasTotales = proyecto.qaData.usaModulos
                ? proyecto.qaData.modulos.flatMap(m => m.pruebas)
                : proyecto.qaData.pruebas;

            pruebasTotales.forEach(p => {
                totalAAtender += p.correcciones.aAtender;
                totalAtendidas += p.correcciones.atendidas;
            });

            if (totalAAtender > 0) {
                return Math.round((totalAtendidas / totalAAtender) * 100);
            }
            return proyecto.qaData.estatusGeneral === 'Finalizado' ? 100 : 0;
        }

        // --- RENDERIZADO ---
        function render() {
            const app = document.getElementById('app');
            const proyectoActivo = getProyectoActivo();
            const moduloActivo = proyectoActivo.qaData.usaModulos ? proyectoActivo.qaData.modulos[indiceModuloActivo] : null;
            const listaPruebas = proyectoActivo.qaData.usaModulos ? (moduloActivo?.pruebas || []) : (proyectoActivo.qaData.pruebas || []);
            const pruebaActiva = listaPruebas[indicePruebaActiva] || null;
            
            const avancePrueba = pruebaActiva && pruebaActiva.correcciones.aAtender > 0 
                ? Math.round((pruebaActiva.correcciones.atendidas / pruebaActiva.correcciones.aAtender) * 100)
                : (pruebaActiva?.estatus === 'Finalizado' ? 100 : 0);

            app.innerHTML = `
                <!-- NAV -->
                <nav class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                    <div class="flex items-center space-x-2">
                        <div class="bg-[#0a2e5c] p-2 rounded-lg">
                            <i data-lucide="clipboard-check" class="w-5 h-5 text-white"></i>
                        </div>
                        <span class="font-bold text-gray-800 hidden sm:block">Control QA Proyectos</span>
                    </div>

                    <div class="relative">
                        <button onclick="toggleMenuPerfil()" class="flex items-center space-x-3 bg-gray-50 hover:bg-gray-100 px-4 py-2 rounded-full border border-gray-200 transition-colors">
                            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700">
                                <i data-lucide="${perfilUsuario === 'admin' ? 'user' : 'lock'}" class="w-4 h-4"></i>
                            </div>
                            <div class="text-left hidden md:block">
                                <p class="text-xs font-bold text-gray-900 leading-none">${perfilUsuario === 'admin' ? 'Administrador' : 'Ente Rector'}</p>
                                <p class="text-[10px] text-gray-500">${perfilUsuario === 'admin' ? 'Ver todos los proyectos' : proyectoActivo.enteRector}</p>
                            </div>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
                        </button>

                        ${mostrarMenuPerfil ? `
                        <div class="absolute right-0 mt-2 w-64 bg-white rounded-2xl shadow-2xl border border-gray-100 py-2 overflow-hidden animate-fade-in">
                            <div class="px-4 py-2 border-b border-gray-50 mb-1">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Simular Vista</p>
                            </div>
                            <button onclick="cambiarPerfil('admin')" class="w-full text-left px-4 py-3 text-sm flex items-center space-x-3 hover:bg-blue-50 ${perfilUsuario === 'admin' ? 'text-blue-700 font-bold bg-blue-50/50' : 'text-gray-600'}">
                                <i data-lucide="layers" class="w-4 h-4"></i> <span>Panel Administrador</span>
                            </button>
                            ${proyectosData.map(p => `
                                <button onclick="cambiarPerfil('${p.id}')" class="w-full text-left px-4 py-3 text-sm flex items-center space-x-3 hover:bg-blue-50 ${perfilUsuario === p.id ? 'text-blue-700 font-bold bg-blue-50/50' : 'text-gray-600'}">
                                    <i data-lucide="lock" class="w-4 h-4"></i> <span class="truncate">${p.enteRector}</span>
                                </button>
                            `).join('')}
                        </div>` : ''}
                    </div>
                </nav>

                <!-- HEADER HERO -->
                <div class="bg-[#0a2e5c] pt-12 pb-24 px-6 lg:px-12">
                    <div class="max-w-7xl mx-auto">
                        ${perfilUsuario === 'admin' ? `
                            <h1 class="text-3xl font-bold text-white mb-4 text-center">Dashboard de Presentación de Pruebas QA</h1>
                            <p class="text-blue-200 text-center mb-10 max-w-2xl mx-auto">Seleccione un proyecto para visualizar el detalle técnico, métricas de avance y control de hallazgos por módulo.</p>
                            
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                ${proyectosData.map(p => `
                                    <div onclick="cambiarProyecto('${p.id}')" class="bg-white rounded-3xl p-6 cursor-pointer transition-all duration-300 transform hover:-translate-y-1 ${idProyectoActivo === p.id ? 'ring-4 ring-blue-400 shadow-xl' : 'shadow-md opacity-90 hover:opacity-100'}">
                                        <div class="flex justify-between items-start mb-6">
                                            <div class="bg-blue-50 p-3 rounded-2xl">
                                                <i data-lucide="${p.icono}" class="w-6 h-6 text-[#0a2e5c]"></i>
                                            </div>
                                            <span class="bg-blue-50 text-blue-800 text-[10px] font-bold px-3 py-1 rounded-full uppercase">QA EN CURSO</span>
                                        </div>
                                        <h3 class="text-xl font-bold text-gray-900 mb-2 leading-tight h-14">${p.nombre}</h3>
                                        <p class="text-xs font-bold text-blue-700 mb-2 uppercase">ENTE RECTOR: ${p.enteRector}</p>
                                        <p class="text-[10px] text-gray-400 font-medium leading-relaxed">${p.descripcion}</p>
                                    </div>
                                `).join('')}
                            </div>
                        ` : `
                            <div class="flex flex-col items-center justify-center text-center py-6">
                                <div class="bg-white/10 p-4 rounded-full mb-4 border border-white/20">
                                    <i data-lucide="${proyectoActivo.icono}" class="w-10 h-10 text-white"></i>
                                </div>
                                <h1 class="text-3xl font-bold text-white mb-2">Portal Institucional de QA</h1>
                                <p class="text-blue-200 text-lg">${proyectoActivo.enteRector}</p>
                                <div class="mt-8 bg-white/10 px-6 py-3 rounded-full border border-white/20 flex items-center space-x-3">
                                    <span class="text-white font-medium uppercase text-xs">Proyecto Activo:</span>
                                    <span class="text-blue-100 font-bold text-sm uppercase">${proyectoActivo.nombre}</span>
                                </div>
                            </div>
                        `}
                    </div>
                </div>

                <!-- MAIN AREA -->
                <div class="max-w-7xl mx-auto px-6 lg:px-12 -mt-10 pb-12">
                    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
                        <div class="bg-white border-b border-gray-100 p-6 sm:px-10 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                            <div>
                                <h2 class="text-2xl font-bold text-gray-800">
                                    Resumen Ejecutivo: <span class="text-blue-600">${proyectoActivo.nombre}</span>
                                </h2>
                                <div class="flex items-center mt-2 space-x-4">
                                    ${proyectoActivo.qaData.usaModulos ? `
                                        <p class="text-xs bg-indigo-50 text-indigo-700 px-2 py-1 rounded-full font-bold border border-indigo-100 flex items-center">
                                            <i data-lucide="layers" class="w-3 h-3 mr-1"></i> ESTRUCTURA MODULAR
                                        </p>
                                    ` : ''}
                                </div>
                            </div>
                            <div class="flex items-center px-4 py-2 rounded-full border-2 font-bold ${getEstatusColor(proyectoActivo.qaData.estatusGeneral)}">
                                <i data-lucide="${getEstatusIcon(proyectoActivo.qaData.estatusGeneral)}" class="w-5 h-5 mr-2"></i>
                                <span class="uppercase text-xs">${proyectoActivo.qaData.estatusGeneral}</span>
                            </div>
                        </div>

                        <div class="p-6 sm:p-10 bg-gray-50/50">
                            <!-- Selector de Módulos -->
                            ${proyectoActivo.qaData.usaModulos ? `
                                <div class="mb-8 bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-3">Módulos del Sistema en Revisión</p>
                                    <div class="flex flex-wrap gap-2">
                                        ${proyectoActivo.qaData.modulos.map((mod, index) => `
                                            <button onclick="cambiarModulo(${index})" class="px-4 py-2.5 rounded-xl font-bold text-sm transition-all border flex items-center ${index === indiceModuloActivo ? 'bg-[#0a2e5c] text-white border-[#0a2e5c] shadow-lg scale-105' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}">
                                                ${mod.nombre}
                                                ${mod.pruebas.length > 0 ? `<span class="ml-2 px-1.5 py-0.5 rounded-full text-[10px] ${index === indiceModuloActivo ? 'bg-white/20 text-white' : 'bg-gray-100 text-gray-400'}">${mod.pruebas.length}</span>` : ''}
                                            </button>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}

                            <!-- Selector de Pruebas -->
                            ${listaPruebas.length > 0 ? `
                                <div class="flex flex-wrap gap-2 mb-6 border-b border-gray-200 pb-4">
                                    ${listaPruebas.map((p, index) => `
                                        <button onclick="cambiarPrueba(${index})" class="px-4 py-2 rounded-lg font-bold text-xs transition-all border uppercase tracking-tighter ${index === indicePruebaActiva ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-gray-400 border-gray-200 hover:bg-gray-50'}">
                                            ${p.nombre}
                                        </button>
                                    `).join('')}
                                </div>
                            ` : ''}

                            <!-- Detalle de Prueba -->
                            ${pruebaActiva ? `
                                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8 animate-fade-in">
                                    <div class="lg:col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div>
                                                <p class="text-xs text-gray-400 mb-1 font-bold uppercase">Código de la Prueba</p>
                                                <p class="text-lg font-bold text-gray-800 flex items-center">
                                                    <i data-lucide="activity" class="w-5 h-5 mr-2 text-blue-500"></i> ${pruebaActiva.codigo}
                                                </p>
                                            </div>
                                            <div>
                                                <p class="text-xs text-gray-400 mb-1 font-bold uppercase">Responsable Institucional</p>
                                                <p class="text-lg font-bold text-gray-800 flex items-center leading-tight">
                                                    <i data-lucide="user" class="w-5 h-5 mr-2 text-blue-500 shrink-0"></i> ${pruebaActiva.responsable}
                                                </p>
                                            </div>
                                        </div>
                                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 pt-6 border-t border-gray-50 mt-6">
                                            <div>
                                                <p class="text-[10px] text-gray-400 mb-1 font-bold uppercase">Inicio</p>
                                                <p class="text-sm font-bold text-gray-700 flex items-center">
                                                    <i data-lucide="calendar" class="w-4 h-4 mr-2 text-blue-400"></i> ${pruebaActiva.fechaInicio}
                                                </p>
                                            </div>
                                            <div>
                                                <p class="text-[10px] text-gray-400 mb-1 font-bold uppercase">Entrega</p>
                                                <p class="text-sm font-bold text-gray-700 flex items-center">
                                                    <i data-lucide="calendar" class="w-4 h-4 mr-2 text-blue-400"></i> ${pruebaActiva.fechaFinalizacion}
                                                </p>
                                            </div>
                                            <div>
                                                <div class="inline-flex items-center px-3 py-1 rounded-full border text-[10px] font-black mt-1 ${getEstatusColor(pruebaActiva.estatus)}">
                                                    <i data-lucide="${getEstatusIcon(pruebaActiva.estatus)}" class="w-3 h-3 mr-1"></i>
                                                    <span class="uppercase">${pruebaActiva.estatus}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex flex-col justify-center items-center">
                                        <p class="text-[11px] text-gray-400 font-bold uppercase mb-4 w-full text-center">Avance de la Prueba</p>
                                        <div class="relative w-36 h-36 flex justify-center items-center">
                                            <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                                <circle cx="18" cy="18" r="16" fill="none" stroke="#f3f4f6" stroke-width="3"></circle>
                                                <circle cx="18" cy="18" r="16" fill="none" stroke="${pruebaActiva.estatus === 'Finalizado' ? '#22c55e' : '#2563eb'}" stroke-width="3" stroke-dasharray="${avancePrueba}, 100" stroke-linecap="round" class="progress-ring-circle"></circle>
                                            </svg>
                                            <div class="absolute flex flex-col items-center justify-center">
                                                <span class="text-4xl font-black text-gray-800 leading-none">${avancePrueba}<span class="text-lg">%</span></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <h3 class="text-sm font-black text-gray-400 uppercase mb-4 flex items-center">
                                    <i data-lucide="activity" class="w-4 h-4 mr-2"></i> Control de Hallazgos y Correcciones
                                </h3>

                                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 mb-8">
                                    ${[
                                        { label: 'Detectadas', value: pruebaActiva.correcciones.detectadas, color: 'bg-red-50 border-red-100 text-red-600', icon: 'bug' },
                                        { label: 'A Atender', value: pruebaActiva.correcciones.aAtender, color: 'bg-cyan-50 border-cyan-200 text-cyan-700 ring-1 ring-cyan-100', icon: 'clipboard-list' },
                                        { label: 'Atendidas', value: pruebaActiva.correcciones.atendidas, color: 'bg-green-50 border-green-100 text-green-600', icon: 'wrench' },
                                        { label: 'Pendientes', value: pruebaActiva.correcciones.pendientes, color: 'bg-yellow-50 border-yellow-100 text-yellow-800 border-yellow-200', icon: 'alert-triangle' },
                                        { label: 'Nuevos Req.', value: pruebaActiva.correcciones.nuevosRequerimientos, color: 'bg-indigo-50 border-indigo-100 text-indigo-600', icon: 'file-plus' }
                                    ].map(stat => `
                                        <div class="rounded-2xl p-4 border flex flex-col justify-between transition-all ${stat.color}">
                                            <div class="flex justify-between items-start mb-2">
                                                <p class="text-[10px] font-black uppercase leading-tight">Correcciones<br/>${stat.label}</p>
                                                <i data-lucide="${stat.icon}" class="w-4 h-4 opacity-70"></i>
                                            </div>
                                            <p class="text-3xl font-black">${stat.value}</p>
                                        </div>
                                    `).join('')}
                                </div>

                                <div class="rounded-2xl p-6 border ${pruebaActiva.correcciones.pendientes > 0 ? 'bg-orange-50 border-orange-200' : 'bg-green-50 border-green-200'}">
                                    <div class="flex items-start">
                                        <div class="mt-1 mr-4">
                                            <i data-lucide="${pruebaActiva.correcciones.pendientes > 0 ? 'alert-circle' : 'check-circle-2'}" class="w-6 h-6 ${pruebaActiva.correcciones.pendientes > 0 ? 'text-orange-500' : 'text-green-500'}"></i>
                                        </div>
                                        <div class="flex-1">
                                            <h4 class="text-xs font-black uppercase tracking-widest mb-2 ${pruebaActiva.correcciones.pendientes > 0 ? 'text-orange-800' : 'text-green-800'}">Observaciones y Estatus de Hallazgos</h4>
                                            <p class="text-sm leading-relaxed font-medium ${pruebaActiva.correcciones.pendientes > 0 ? 'text-orange-900' : 'text-green-900'}">${pruebaActiva.correcciones.observacion}</p>
                                        </div>
                                    </div>
                                </div>
                            ` : `
                                <div class="bg-white rounded-3xl p-16 border-2 border-dashed border-gray-200 flex flex-col items-center justify-center text-center">
                                    <div class="bg-gray-50 p-6 rounded-full mb-6">
                                        <i data-lucide="clipboard-check" class="w-12 h-12 text-gray-300"></i>
                                    </div>
                                    <h3 class="text-xl font-bold text-gray-700 mb-2">Módulo sin registros de QA</h3>
                                    <p class="text-gray-400 max-w-xs mx-auto text-sm">Este módulo se encuentra a la espera de la fase de pruebas correspondiente.</p>
                                </div>
                            `}
                        </div>
                    </div>
                </div>

                <!-- FOOTER -->
                <footer class="max-w-7xl mx-auto px-6 py-8 text-center border-t border-gray-200 mt-8">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                        Sistema de Control de Calidad Institucional &copy; 2026 - Acceso Restringido ${perfilUsuario !== 'admin' ? `| Visualización para ${proyectoActivo.enteRector}` : ''}
                    </p>
                </footer>
            `;

            // Inicializar iconos de Lucide después del render
            lucide.createIcons();
        }

        // --- MANEJADORES DE EVENTOS ---
        window.toggleMenuPerfil = () => {
            mostrarMenuPerfil = !mostrarMenuPerfil;
            render();
        };

        window.cambiarPerfil = (id) => {
            perfilUsuario = id;
            mostrarMenuPerfil = false;
            if (id !== 'admin') {
                idProyectoActivo = id;
                indiceModuloActivo = 0;
                indicePruebaActiva = 0;
            }
            render();
        };

        window.cambiarProyecto = (id) => {
            idProyectoActivo = id;
            indiceModuloActivo = 0;
            indicePruebaActiva = 0;
            render();
        };

        window.cambiarModulo = (index) => {
            indiceModuloActivo = index;
            indicePruebaActiva = 0;
            render();
        };

        window.cambiarPrueba = (index) => {
            indicePruebaActiva = index;
            render();
        };

        // --- INICIO ---
        render();

    </script>
</body>
</html>
